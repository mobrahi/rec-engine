<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User-Based Collaborative Filtering Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .star-rating { color: #fbbf24; }
        .slider-thumb::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #4f46e5;
            cursor: pointer;
        }
        .matrix-cell { transition: all 0.2s; }
        .matrix-cell:hover { transform: scale(1.05); z-index: 10; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .similarity-bar { transition: width 0.5s ease-out; }
    </style>
</head>
<body class="text-gray-800">

    <!-- Header -->
    <header class="bg-indigo-900 text-white shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-500 p-2 rounded-lg">
                    <i class="fas fa-users-cog text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight">Collaborative Filtering Engine</h1>
                    <p class="text-xs text-indigo-200">User-Based Nearest Neighbors Algorithm</p>
                </div>
            </div>
            <div class="flex gap-4 text-sm">
                <div class="bg-indigo-800 px-3 py-1 rounded-full">
                    <i class="fas fa-database mr-1"></i> <span id="user-count">0</span> Users
                </div>
                <div class="bg-indigo-800 px-3 py-1 rounded-full">
                    <i class="fas fa-film mr-1"></i> <span id="item-count">0</span> Items
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-6 grid grid-cols-1 lg:grid-cols-12 gap-6">

        <!-- Left Panel: Controls & User Management -->
        <div class="lg:col-span-4 space-y-6">
            
            <!-- Algorithm Configuration -->
            <div class="glass-panel rounded-xl p-6">
                <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                    <i class="fas fa-sliders-h text-indigo-600"></i> Algorithm Config
                </h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Similarity Metric</label>
                        <select id="similarity-metric" class="w-full bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 outline-none">
                            <option value="pearson">Pearson Correlation (Centered)</option>
                            <option value="cosine">Cosine Similarity (Vector)</option>
                            <option value="euclidean">Euclidean Distance (Inverse)</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">K-Nearest Neighbors: <span id="k-val" class="text-indigo-600 font-bold">3</span></label>
                        <input type="range" id="k-slider" min="1" max="10" value="3" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer slider-thumb">
                    </div>

                    <div class="flex items-center justify-between bg-indigo-50 p-3 rounded-lg">
                        <span class="text-sm font-medium text-indigo-900">Prediction Method</span>
                        <span class="text-xs bg-indigo-200 text-indigo-800 px-2 py-1 rounded">Weighted Average</span>
                    </div>
                </div>
            </div>

            <!-- Active User Profile -->
            <div class="glass-panel rounded-xl p-6">
                <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                    <i class="fas fa-user-circle text-indigo-600"></i> Active User
                </h2>
                
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Select User</label>
                    <select id="active-user-select" class="w-full bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 outline-none">
                        <!-- Populated by JS -->
                    </select>
                </div>

                <div class="border-t pt-4">
                    <h3 class="text-sm font-semibold text-gray-600 mb-3">Rate New Items</h3>
                    <div id="rating-interface" class="space-y-3">
                        <!-- Dynamic Rating Inputs -->
                    </div>
                </div>
            </div>

            <!-- Add New User -->
            <div class="glass-panel rounded-xl p-6">
                <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                    <i class="fas fa-user-plus text-indigo-600"></i> Add User
                </h2>
                <div class="flex gap-2">
                    <input type="text" id="new-username" placeholder="User Name" class="flex-1 bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 outline-none">
                    <button onclick="app.addUser()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg transition-colors">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Center Panel: Data Matrix & Visualization -->
        <div class="lg:col-span-8 space-y-6">
            
            <!-- Rating Matrix -->
            <div class="glass-panel rounded-xl p-6 overflow-hidden">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-semibold flex items-center gap-2">
                        <i class="fas fa-table text-indigo-600"></i> User-Item Rating Matrix
                    </h2>
                    <button onclick="app.generateRandomData()" class="text-sm bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1 rounded-lg transition-colors">
                        <i class="fas fa-random mr-1"></i> Regenerate Data
                    </button>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-sm text-left">
                        <thead>
                            <tr id="matrix-header" class="bg-gray-50 text-gray-600">
                                <th class="px-4 py-3 font-medium rounded-tl-lg">User</th>
                                <!-- Items headers injected here -->
                            </tr>
                        </thead>
                        <tbody id="matrix-body" class="divide-y divide-gray-100">
                            <!-- Rows injected here -->
                        </tbody>
                    </table>
                </div>
                <div class="mt-3 flex gap-4 text-xs text-gray-500 justify-center">
                    <div class="flex items-center gap-1"><div class="w-3 h-3 bg-gray-100 border"></div> Unrated</div>
                    <div class="flex items-center gap-1"><div class="w-3 h-3 bg-indigo-100 border border-indigo-300"></div> Predicted</div>
                    <div class="flex items-center gap-1"><div class="w-3 h-3 bg-white border"></div> Rated</div>
                </div>
            </div>

            <!-- Similarity Analysis -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Nearest Neighbors -->
                <div class="glass-panel rounded-xl p-6">
                    <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                        <i class="fas fa-project-diagram text-indigo-600"></i> Similar Users (Neighbors)
                    </h2>
                    <div id="neighbors-list" class="space-y-3">
                        <!-- Injected via JS -->
                    </div>
                </div>

                <!-- Recommendations -->
                <div class="glass-panel rounded-xl p-6">
                    <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                        <i class="fas fa-magic text-indigo-600"></i> Top Recommendations
                    </h2>
                    <div id="recommendations-list" class="space-y-3">
                        <!-- Injected via JS -->
                    </div>
                </div>
            </div>

            <!-- Math Explanation -->
            <div class="glass-panel rounded-xl p-6">
                <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                    <i class="fas fa-square-root-alt text-indigo-600"></i> Algorithm Math
                </h2>
                <div class="bg-gray-50 rounded-lg p-4 font-mono text-sm text-gray-700 overflow-x-auto">
                    <div id="math-explanation" class="space-y-2">
                        <!-- Dynamic explanation -->
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        class CollaborativeFiltering {
            constructor() {
                this.users = [];
                this.items = ['Inception', 'Matrix', 'Titanic', 'Avatar', 'Jaws', 'Alien', 'Gladiator', 'Frozen'];
                this.ratings = {}; // { userId: { item: rating } }
                this.predictions = {}; // { userId: { item: rating } }
                this.init();
            }

            init() {
                this.generateRandomData();
                this.setupEventListeners();
            }

            generateRandomData() {
                this.users = ['Alice', 'Bob', 'Carol', 'Dave', 'Eve', 'Frank'];
                this.ratings = {};
                
                // Generate random ratings (1-5, or null)
                this.users.forEach(user => {
                    this.ratings[user] = {};
                    this.items.forEach(item => {
                        // 70% chance of rating
                        if (Math.random() > 0.3) {
                            this.ratings[user][item] = Math.floor(Math.random() * 5) + 1;
                        }
                    });
                });

                this.updateUI();
            }

            addUser(name) {
                if (!name || this.users.includes(name)) return;
                this.users.push(name);
                this.ratings[name] = {};
                this.updateUI();
                
                // Auto-select new user
                document.getElementById('active-user-select').value = name;
                this.handleUserChange();
            }

            setRating(user, item, rating) {
                if (rating === 0) {
                    delete this.ratings[user][item];
                } else {
                    this.ratings[user][item] = parseInt(rating);
                }
                this.calculateAll();
                this.renderMatrix();
                this.renderRecommendations();
            }

            // --- Math Core ---

            getMeanRatings(user) {
                const ratings = Object.values(this.ratings[user]).filter(r => r !== undefined && r !== null);
                if (ratings.length === 0) return 0;
                return ratings.reduce((a, b) => a + b, 0) / ratings.length;
            }

            pearsonCorrelation(user1, user2) {
                const u1Ratings = this.ratings[user1];
                const u2Ratings = this.ratings[user2];
                
                let commonItems = [];
                for (let item in u1Ratings) {
                    if (u2Ratings[item] !== undefined) commonItems.push(item);
                }

                if (commonItems.length === 0) return 0;

                const mean1 = this.getMeanRatings(user1);
                const mean2 = this.getMeanRatings(user2);

                let num = 0, den1 = 0, den2 = 0;

                commonItems.forEach(item => {
                    const dev1 = u1Ratings[item] - mean1;
                    const dev2 = u2Ratings[item] - mean2;
                    num += dev1 * dev2;
                    den1 += dev1 * dev1;
                    den2 += dev2 * dev2;
                });

                const den = Math.sqrt(den1) * Math.sqrt(den2);
                return den === 0 ? 0 : num / den;
            }

            cosineSimilarity(user1, user2) {
                const u1Ratings = this.ratings[user1];
                const u2Ratings = this.ratings[user2];
                
                let commonItems = [];
                for (let item in u1Ratings) {
                    if (u2Ratings[item] !== undefined) commonItems.push(item);
                }
                if (commonItems.length === 0) return 0;

                let dot = 0, norm1 = 0, norm2 = 0;
                commonItems.forEach(item => {
                    dot += u1Ratings[item] * u2Ratings[item];
                    norm1 += u1Ratings[item] * u1Ratings[item];
                    norm2 += u2Ratings[item] * u2Ratings[item];
                });

                return (Math.sqrt(norm1) * Math.sqrt(norm2)) === 0 ? 0 : dot / (Math.sqrt(norm1) * Math.sqrt(norm2));
            }

            euclideanSimilarity(user1, user2) {
                const u1Ratings = this.ratings[user1];
                const u2Ratings = this.ratings[user2];
                let commonItems = [];
                for (let item in u1Ratings) {
                    if (u2Ratings[item] !== undefined) commonItems.push(item);
                }
                if (commonItems.length === 0) return 0;

                let sumSq = 0;
                commonItems.forEach(item => {
                    const diff = u1Ratings[item] - u2Ratings[item];
                    sumSq += diff * diff;
                });
                
                // Convert distance to similarity (0 to 1)
                return 1 / (1 + Math.sqrt(sumSq));
            }

            getSimilarity(user1, user2) {
                const metric = document.getElementById('similarity-metric').value;
                if (metric === 'pearson') return this.pearsonCorrelation(user1, user2);
                if (metric === 'cosine') return this.cosineSimilarity(user1, user2);
                return this.euclideanSimilarity(user1, user2);
            }

            getKNearestNeighbors(targetUser, k) {
                const similarities = this.users
                    .filter(u => u !== targetUser)
                    .map(user => ({
                        user,
                        similarity: this.getSimilarity(targetUser, user),
                        commonItems: this.getCommonItemCount(targetUser, user)
                    }))
                    .filter(u => u.similarity > 0)
                    .sort((a, b) => b.similarity - a.similarity)
                    .slice(0, k);
                
                return similarities;
            }

            getCommonItemCount(u1, u2) {
                let count = 0;
                for (let item in this.ratings[u1]) {
                    if (this.ratings[u2][item] !== undefined) count++;
                }
                return count;
            }

            predictRating(targetUser, item, neighbors) {
                if (this.ratings[targetUser][item] !== undefined) return null; // Already rated

                let weightedSum = 0;
                let simSum = 0;

                neighbors.forEach(neighbor => {
                    const nUser = neighbor.user;
                    const rating = this.ratings[nUser][item];
                    if (rating !== undefined) {
                        weightedSum += neighbor.similarity * rating;
                        simSum += Math.abs(neighbor.similarity);
                    }
                });

                if (simSum === 0) return 0;
                return weightedSum / simSum;
            }

            calculateAll() {
                const targetUser = document.getElementById('active-user-select').value;
                const k = parseInt(document.getElementById('k-slider').value);
                
                if (!targetUser) return;

                const neighbors = this.getKNearestNeighbors(targetUser, k);
                this.predictions[targetUser] = {};

                this.items.forEach(item => {
                    if (this.ratings[targetUser][item] === undefined) {
                        const pred = this.predictRating(targetUser, item, neighbors);
                        if (pred !== null && pred > 0) {
                            this.predictions[targetUser][item] = parseFloat(pred.toFixed(2));
                        }
                    }
                });

                this.renderNeighbors(neighbors);
                this.renderMath(targetUser, neighbors);
            }

            // --- Rendering ---

            updateUI() {
                // Update counts
                document.getElementById('user-count').textContent = this.users.length;
                document.getElementById('item-count').textContent = this.items.length;

                // Populate User Select
                const select = document.getElementById('active-user-select');
                select.innerHTML = this.users.map(u => `<option value="${u}">${u}</option>`).join('');
                
                this.renderMatrix();
                this.renderRatingInterface();
                this.calculateAll();
            }

            renderMatrix() {
                const thead = document.getElementById('matrix-header');
                const tbody = document.getElementById('matrix-body');
                const targetUser = document.getElementById('active-user-select').value;

                // Header
                let headerHTML = '<th class="px-4 py-3 font-medium rounded-tl-lg sticky left-0 bg-gray-50 z-10">User</th>';
                this.items.forEach(item => {
                    headerHTML += `<th class="px-4 py-3 font-medium min-w-[100px]">${item}</th>`;
                });
                headerHTML += '<th class="px-4 py-3 font-medium rounded-tr-lg">Mean</th>';
                thead.innerHTML = headerHTML;

                // Body
                tbody.innerHTML = this.users.map(user => {
                    const isActive = user === targetUser;
                    const rowClass = isActive ? 'bg-indigo-50 border-l-4 border-indigo-500' : 'bg-white hover:bg-gray-50';
                    
                    let html = `<tr class="${rowClass} transition-colors">
                        <td class="px-4 py-3 font-medium sticky left-0 ${isActive ? 'bg-indigo-50' : 'bg-white'} z-10">${user}</td>`;
                    
                    this.items.forEach(item => {
                        const actual = this.ratings[user][item];
                        const predicted = this.predictions[user]?.[item];
                        
                        let cellContent = '';
                        let cellClass = 'text-center py-2 rounded mx-1 matrix-cell cursor-pointer ';
                        
                        if (actual !== undefined) {
                            cellContent = this.renderStars(actual);
                            cellClass += 'bg-white border border-gray-200 text-gray-700';
                        } else if (predicted !== undefined && user === targetUser) {
                            cellContent = `<span class="text-indigo-600 font-bold">${predicted.toFixed(1)}</span>`;
                            cellClass += 'bg-indigo-50 border border-indigo-200';
                        } else {
                            cellContent = '<span class="text-gray-300">-</span>';
                            cellClass += 'bg-gray-50 border border-transparent';
                        }
                        
                        html += `<td class="${cellClass}" onclick="app.focusRating('${item}')">${cellContent}</td>`;
                    });

                    const mean = this.getMeanRatings(user).toFixed(1);
                    html += `<td class="px-4 py-3 text-center font-mono text-sm text-gray-500">${mean > 0 ? mean : '-'}</td></tr>`;
                    return html;
                }).join('');
            }

            renderStars(rating) {
                let html = '<div class="flex justify-center gap-0.5 text-xs star-rating">';
                for (let i = 1; i <= 5; i++) {
                    if (i <= rating) html += '<i class="fas fa-star"></i>';
                    else html += '<i class="far fa-star text-gray-300"></i>';
                }
                html += '</div>';
                return html;
            }

            renderRatingInterface() {
                const container = document.getElementById('rating-interface');
                const user = document.getElementById('active-user-select').value;
                
                container.innerHTML = this.items.map(item => {
                    const current = this.ratings[user]?.[item] || 0;
                    return `
                        <div class="flex items-center justify-between bg-white p-2 rounded-lg border border-gray-200">
                            <span class="font-medium text-sm">${item}</span>
                            <div class="flex gap-1">
                                ${[1,2,3,4,5].map(star => `
                                    <button onclick="app.setRating('${user}', '${item}', ${current === star ? 0 : star})" 
                                        class="w-8 h-8 rounded transition-all ${current >= star ? 'text-yellow-400 bg-yellow-50' : 'text-gray-300 hover:bg-gray-100'}">
                                        <i class="${current >= star ? 'fas' : 'far'} fa-star"></i>
                                    </button>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }).join('');
            }

            renderNeighbors(neighbors) {
                const container = document.getElementById('neighbors-list');
                if (neighbors.length === 0) {
                    container.innerHTML = '<div class="text-gray-400 text-center py-4">No similar users found yet.</div>';
                    return;
                }

                container.innerHTML = neighbors.map((n, idx) => {
                    const percent = Math.abs(n.similarity) * 100;
                    const color = n.similarity > 0.5 ? 'bg-green-500' : (n.similarity > 0 ? 'bg-indigo-500' : 'bg-red-500');
                    
                    return `
                        <div class="bg-white p-3 rounded-lg border border-gray-200 shadow-sm fade-in" style="animation-delay: ${idx * 100}ms">
                            <div class="flex justify-between items-center mb-1">
                                <span class="font-semibold text-gray-800">${n.user}</span>
                                <span class="text-xs bg-gray-100 px-2 py-1 rounded text-gray-600">${n.commonItems} common items</span>
                            </div>
                            <div class="flex items-center gap-2 text-sm">
                                <span class="font-mono w-12 text-right">${n.similarity.toFixed(3)}</span>
                                <div class="flex-1 h-2 bg-gray-100 rounded-full overflow-hidden">
                                    <div class="h-full ${color} similarity-bar" style="width: ${percent}%"></div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            renderRecommendations() {
                const container = document.getElementById('recommendations-list');
                const user = document.getElementById('active-user-select').value;
                const preds = this.predictions[user] || {};
                
                const sorted = Object.entries(preds)
                    .sort((a, b) => b[1] - a[1])
                    .slice(0, 5);

                if (sorted.length === 0) {
                    container.innerHTML = '<div class="text-gray-400 text-center py-4">Rate more items to get recommendations.</div>';
                    return;
                }

                container.innerHTML = sorted.map(([item, score], idx) => `
                    <div class="flex items-center gap-3 bg-white p-3 rounded-lg border border-gray-200 shadow-sm fade-in" style="animation-delay: ${idx * 100}ms">
                        <div class="bg-indigo-100 text-indigo-700 w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm">
                            ${idx + 1}
                        </div>
                        <div class="flex-1">
                            <div class="font-semibold text-gray-800">${item}</div>
                            <div class="text-xs text-gray-500">Predicted Rating</div>
                        </div>
                        <div class="text-right">
                            <div class="text-lg font-bold text-indigo-600">${score.toFixed(1)}</div>
                            <div class="flex text-xs text-yellow-400 gap-0.5">
                                ${this.renderStars(Math.round(score)).replace('text-xs', 'text-[10px]')}
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            renderMath(targetUser, neighbors) {
                const metric = document.getElementById('similarity-metric').value;
                const metricName = metric === 'pearson' ? 'Pearson Correlation' : (metric === 'cosine' ? 'Cosine Similarity' : 'Euclidean Similarity');
                
                let html = `
                    <div class="mb-2"><span class="font-bold text-indigo-700">Step 1:</span> Find K-Nearest Neighbors using ${metricName}</div>
                    <div class="mb-2"><span class="font-bold text-indigo-700">Step 2:</span> Predict rating for user <span class="font-bold">${targetUser}</span> using weighted average:</div>
                    <div class="bg-white p-2 rounded border border-gray-200 my-2 text-center">
                        P(u, i) = Σ(Sim(u, v) × R(v, i)) / Σ|Sim(u, v)|
                    </div>
                    <div class="text-xs text-gray-500">Where Sim(u,v) is the similarity between active user u and neighbor v, and R(v,i) is neighbor v's rating for item i.</div>
                `;
                
                if (neighbors.length > 0 && Object.keys(this.predictions[targetUser] || {}).length > 0) {
                    const topItem = Object.entries(this.predictions[targetUser]).sort((a,b) => b[1]-a[1])[0];
                    if (topItem) {
                        const [item, pred] = topItem;
                        let calc = neighbors.map(n => {
                            const r = this.ratings[n.user][item];
                            if (r !== undefined) return `(${n.similarity.toFixed(2)} × ${r})`;
                            return null;
                        }).filter(Boolean).join(' + ');
                        
                        let simSum = neighbors.reduce((acc, n) => acc + Math.abs(n.similarity), 0).toFixed(2);
                        
                        html += `<div class="mt-2 pt-2 border-t border-gray-200"><span class="font-bold text-indigo-700">Example Calculation for "${item}":</span> [${calc}] / ${simSum} = ${pred.toFixed(2)}</div>`;
                    }
                }
                
                document.getElementById('math-explanation').innerHTML = html;
            }

            // --- Event Handlers ---

            setupEventListeners() {
                document.getElementById('active-user-select').addEventListener('change', () => this.handleUserChange());
                document.getElementById('k-slider').addEventListener('input', (e) => {
                    document.getElementById('k-val').textContent = e.target.value;
                    this.calculateAll();
                });
                document.getElementById('similarity-metric').addEventListener('change', () => this.calculateAll());
            }

            handleUserChange() {
                this.renderMatrix();
                this.renderRatingInterface();
                this.calculateAll();
            }

            focusRating(item) {
                // Scroll to rating interface and highlight
                const container = document.getElementById('rating-interface');
                // Simple visual feedback could be added here
            }
        }

        // Initialize App
